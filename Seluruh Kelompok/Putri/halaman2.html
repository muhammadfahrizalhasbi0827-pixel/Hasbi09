<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Demografi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #d987c6 0%, #e757e7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-container {
            background: rgb(233, 227, 227);
            border-radius: 20px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
        }
        h1 { color: #333; text-align: center; margin-bottom: 40px; font-size: 1.7em; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input, select { 
            width: 100%; padding: 15px; border: 2px solid #b6c1cb; 
            border-radius: 12px; font-size: 16px; transition: all 0.3s; 
            background: #dee0e1;
        }
        input:focus, select:focus {
            outline: none; border-color: #4facfe; background: white;
            box-shadow: 0 0 0 4px rgba(79,172,254,0.1);
        }
        .date-group {
            display: grid; grid-template-columns: 2fr 2fr 3fr; gap: 12px;
        }
        .progress { 
            text-align: center; color: #666; margin-bottom: 20px;
            font-weight: bold; font-size: 0.9em;
        }
        button {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, #c9d4de, #d3ddde); color: white;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(79,172,254,0.4); }
        .link-next { background: linear-gradient(135deg, #eb96e4, #da64c8); margin-top: 20px; }
        .storage-warning { background: #dad3ba; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #e0dcd1; }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="progress">Progres: 1 dari 3</div>
        <h1>Data Demografi</h1>
        <div class="storage-warning">
            <strong>Info:</strong> Data ini disimpan sementara di browser. Lanjutkan ke halaman berikutnya.
        </div>
        <form id="demografiForm">
            <div class="form-group">
                <label for="nama">Nama Lengkap *</label>
                <input type="text" id="nama" required>
            </div>
            <div class="form-group">
                <label>Tanggal Lahir *</label>
                <div class="date-group">
                    <select id="tglLahir" required>
                        <option value="">Tanggal</option>
                        <script>for(let i=1;i<=31;i++)document.write(`<option value="${i}">${i}</option>`);</script>
                    </select>
                    <select id="blnLahir" required>
                        <option value="">Bulan</option>
                        <option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option>
                        <option value="04">Apr</option><option value="05">Mei</option><option value="06">Jun</option>
                        <option value="07">Jul</option><option value="08">Ags</option><option value="09">Sep</option>
                        <option value="10">Okt</option><option value="11">Nov</option><option value="12">Des</option>
                    </select>
                    <select id="thnLahir" required>
                        <option value="">Tahun</option>
                        <script>for(let i=1980;i<=2010;i++)document.write(`<option value="${i}">${i}</option>`);</script>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="alamat">Alamat Lengkap *</label>
                <input type="text" id="alamat" required>
            </div>
            <div class="form-group">
                <label for="telpon">No. Telepon *</label>
                <input type="tel" id="telpon" pattern="[0-9+\-\s()]{10,}" required title="Masukkan nomor telepon valid (min 10 digit)">
            </div>
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="pendidikan">Tingkat Pendidikan *</label>
                <select id="pendidikan" required>
                    <option value="">Pilih...</option>
                    <option value="SD/MI">SD/MI</option>
                    <option value="SMP/MTs">SMP/MTs</option>
                    <option value="SMA/SMK/MA">SMA/SMK/MA</option>
                    <option value="D3/Diploma">D3/Diploma</option>
                    <option value="S1/Sarjana">S1/Sarjana</option>
                    <option value="S2/Magister">S2/Magister</option>
                    <option value="S3/Doktor">S3/Doktor</option>
                </select>
            </div>
        </form>
        <a href="halaman3.html" style="text-decoration: none;">
            <button class="link-next" onclick="saveDemografi(); if(!validateForm()) return false;">Berikutnya</button>
        </a>
    </div>

    <script>
        function validateForm() {
            const form = document.getElementById('demografiForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return false;
            }
            return true;
        }

        function saveDemografi() {
            if (!validateForm()) return;
            
            const data = {
                nama: document.getElementById('nama').value,
                tglLahir: `${document.getElementById('tglLahir').value}/${document.getElementById('blnLahir').value}/${document.getElementById('thnLahir').value}`,
                alamat: document.getElementById('alamat').value,
                telpon: document.getElementById('telpon').value,
                email: document.getElementById('email').value,
                pendidikan: document.getElementById('pendidikan').value,
                timestamp: new Date().toLocaleString('id-ID')
            };
            
            localStorage.setItem('demografiData', JSON.stringify(data));
            alert('✅ Data demografi tersimpan! Lanjut ke halaman berikutnya.');
        }

        // Load data jika ada
        window.onload = function() {
            const saved = localStorage.getItem('demografiData');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('nama').value = data.nama || '';
                document.getElementById('tglLahir').value = data.tglLahir ? data.tglLahir.split('/')[0] : '';
                document.getElementById('blnLahir').value = data.tglLahir ? data.tglLahir.split('/')[1] : '';
                document.getElementById('thnLahir').value = data.tglLahir ? data.tglLahir.split('/')[2] : '';
                document.getElementById('alamat').value = data.alamat || '';
                document.getElementById('telpon').value = data.telpon || '';
                document.getElementById('email').value = data.email || '';
                document.getElementById('pendidikan').value = data.pendidikan || '';
            }
        };
    </script>
</body>
</html>
