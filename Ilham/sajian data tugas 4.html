<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sajian Data 4</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 25px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 32px;
      color: #f8fafc;
      letter-spacing: 1px;
    }

    p {
      text-align: center;
      margin-bottom: 25px;
      color: #cbd5e1;
      font-size: 16px;
    }

    .report-frame {
      position: relative;
      width: 100%;
      height: 700px;
      overflow: hidden;
      border-radius: 15px;
      border: 3px solid rgba(255, 255, 255, 0.2);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 24px;
      }

      .report-frame {
        height: 500px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Sajian Data 4</h1>
    <p>Visualisasi data interaktif melalui Google Data Studio</p>

    <div class="report-frame">
      <iframe 
        src="https://datastudio.google.com/embed/reporting/fc58af1e-c3ab-4805-84e6-a26b2d4e86dc/page/page_12345"
        allowfullscreen>
      </iframe>
    </div>
      <div style="margin-top: 40px;">
      <h1>Spreadsheet Data</h1>
      <p>Data spreadsheet yang terhubung langsung dari Google Sheets</p>

      <div class="report-frame">
        <iframe 
          src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQWiNOfWdbWM1-p7IahIje9V2E3eWPm4PyRErTDKjRDjIZknp6T7Yf6rv45rwTdn9cQYPILFU_Ex5gd/pubhtml?gid=853943777&amp;single=true&amp;widget=true&amp;headers=false">
        </iframe>
      </div>
    </div>

  </div>

</body>
</html>
