<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg,#020617,#0f172a);
    color:white;
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

nav h1{
    font-family:'Playfair Display', serif;
}

nav ul{
    display:flex;
    list-style:none;
}

nav li{
    margin-left:30px;
}

nav a{
    color:white;
    text-decoration:none;
    position:relative;
}

nav a::after{
    content:"";
    position:absolute;
    width:0;
    height:2px;
    background:#38bdf8;
    left:0;
    bottom:-5px;
    transition:0.3s;
}

nav a:hover::after{
    width:100%;
}

/* Container */
.container{
    padding:50px 80px;
}

/* Judul */
.container h2{
    font-family:'Playfair Display', serif;
    margin-bottom:30px;
}

/* Gallery Grid */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* Card */
.card{
    position:relative;
    border-radius:20px;
    overflow:hidden;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    transition:0.4s;
}

/* Image */
.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    transition:0.4s;
}

/* Overlay */
.overlay{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    transition:0.4s;
}

/* Text */
.overlay h3{
    font-family:'Playfair Display', serif;
}

/* Hover Effect */
.card:hover{
    transform:translateY(-10px);
}

.card:hover img{
    transform:scale(1.1);
}

.card:hover .overlay{
    opacity:1;
}

/* Animasi */
.card{
    animation:fadeUp 1s ease forwards;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>

<body>

<nav>
    <h1>XilhamBillabong Website</h1>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="biodata.html">Biodata</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="video.html">Video</a></li>
        <li><a href="Lain-lain.html">Koleksi</a></li>
    </ul>
</nav>

<div class="container">
    <h2>Gallery My Home</h2>

    <div class="gallery">

        <div class="card">
            <img src="depan rumah f.jpeg">
            <div class="overlay">
                <h3>Depan Rumah</h3>
            </div>
        </div>

        <div class="card">
            <img src="samping rumah f.jpeg">
            <div class="overlay">
                <h3>Samping Rumah</h3>
            </div>
        </div>

        <div class="card">
            <img src="belakang rumah foto.jpeg">
            <div class="overlay">
                <h3>Belakang Rumah</h3>
            </div>
        </div>

    </div>
</div>

</body>
</html>
