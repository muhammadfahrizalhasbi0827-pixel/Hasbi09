<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Tugas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #0083b0;
            --secondary-color: #00b4db;
            --accent-color: #00d4ff;
            --dark-bg: #0a1f2e;
            --light-text: #ffffff;
            --card-bg: #ffffff;
            --card-text: #0a1f2e;
            --shadow-sm: 0 2px 8px rgba(0, 131, 176, 0.1);
            --shadow-md: 0 8px 24px rgba(0, 131, 176, 0.15);
            --shadow-lg: 0 16px 40px rgba(0, 131, 176, 0.2);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #0d2d42 50%, #0a4d6d 100%);
            font-family: 'Poppins', sans-serif;
            color: var(--light-text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Tombol Kembali (Back Button) */
        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-btn svg {
            width: 16px;
            height: 16px;
            transition: transform 0.3s ease;
        }

        .back-btn:hover {
            color: var(--accent-color);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
        }

        .back-btn:hover svg {
            transform: translateX(-3px);
        }

        /* Animated background elements */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-color);
            top: -100px;
            right: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary-color);
            bottom: -50px;
            left: -50px;
            animation: float 10s ease-in-out infinite;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(30px) translateX(20px); }
        }

        .container {
            text-align: center;
            max-width: 1200px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
            margin-top: 40px; /* Memberi ruang di bawah tombol kembali */
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--secondary-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            justify-content: center;
            margin-bottom: 80px;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            color: var(--card-text);
            padding: 32px 24px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            box-shadow: var(--shadow-sm);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0, 131, 176, 0.1);
            overflow: hidden;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 140px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--secondary-color);
            background: linear-gradient(135deg, rgba(0, 180, 219, 0.05), rgba(0, 212, 255, 0.05));
        }

        .card:active {
            transform: translateY(-4px);
        }

        footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .back-btn {
                top: 16px;
                left: 16px;
                font-size: 13px;
                padding: 6px 12px;
            }

            .container {
                margin-top: 60px;
            }

            h1 {
                font-size: 36px;
                margin-bottom: 8px;
            }

            .header {
                margin-bottom: 40px;
            }

            .menu {
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 16px;
            }

            .card {
                padding: 24px 16px;
                min-height: 120px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .container {
                margin-top: 80px;
            }

            h1 {
                font-size: 28px;
            }

            .subtitle {
                font-size: 14px;
            }

            .header {
                margin-bottom: 32px;
            }

            .menu {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .card {
                padding: 20px 16px;
                min-height: 100px;
                font-size: 13px;
            }

            footer {
                font-size: 12px;
                bottom: 16px;
            }
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        /* Focus styles for keyboard navigation */
        .card:focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }
    </style>

</head>
