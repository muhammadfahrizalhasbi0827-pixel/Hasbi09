<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Saya</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        body {

        }

        header {
            background: #0077b6;

            padding: 20px;

            text-align: center;

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {

        }

        .container {
            padding: 40px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        .video-box {
            background: white;

            width: 70%;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        video {
            width: 100%;
            border-radius: 10px;
        }

        footer {
            background: #0077b6;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 30px;
        }

        @media (max-width: 600px) {

<nav>
