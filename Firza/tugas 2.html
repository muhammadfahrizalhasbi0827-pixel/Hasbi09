<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pengumpulan Data Keuangan</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
            margin-top: 30px;
            color: #0056b3;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="date"], input[type="email"], 
        input[type="tel"], input[type="number"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* Style untuk Radio Button agar terlihat seperti Button biasa */
        .radio-button-group {
            display: flex;
            gap: 10px;
        }
        .radio-button-group input[type="radio"] {
            display: none;
        }
        .radio-button-group label {
            padding: 10px 20px;
            background-color: #e9ecef;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: normal;
        }
        .radio-button-group input[type="radio"]:checked + label {
            background-color: #0056b3;
            color: white;
            border-color: #0056b3;
        }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .submit-btn:hover {
            background-color: #218838;
        }
        #message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center;">Formulir Data & Transaksi</h1>
    
    <form id="dataForm" name="dataForm">
        
        <h2>Data Demografi</h2>
        <div class="form-group">
            <label>Nama Pengguna:</label>
            <input type="text" name="nama" required>
        </div>
        <div class="form-group">
            <label>Tanggal Lahir:</label>
            <input type="date" name="tgl_lahir" required>
        </div>
        <div class="form-group">
            <label>Alamat:</label>
            <textarea name="alamat" rows="3" required></textarea>
        </div>
        <div class="form-group">
            <label>No Telepon:</label>
            <input type="tel" name="telepon" required>
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Pendidikan (Pilih atau Ketik untuk mencari):</label>
            <input list="pendidikan-list" name="pendidikan" required>
            <datalist id="pendidikan-list">
                <option value="SD/Sederajat">
                <option value="SMP/Sederajat">
                <option value="SMA/SMK/Sederajat">
                <option value="Diploma (D1-D4)">
                <option value="Sarjana (S1)">
                <option value="Magister (S2)">
                <option value="Doktor (S3)">
            </datalist>
        </div>

        <h2>Data Bank</h2>
        <div class="form-group">
            <label>Nama Bank (Pilih atau Ketik untuk mencari):</label>
            <input list="bank-list" name="nama_bank" required>
            <datalist id="bank-list">
                <option value="Bank BCA">
                <option value="Bank Mandiri">
                <option value="Bank BNI">
                <option value="Bank BRI">
                <option value="Bank BSI">
                <option value="Bank CIMB Niaga">
                <option value="Bank Danamon">
            </datalist>
        </div>
        <div class="form-group">
            <label>Nomor Rekening:</label>
            <input type="number" name="no_rekening" required>
        </div>

        <h2>Data Transaksi Keuangan</h2>
        <div class="form-group">
            <label>Tanggal Transaksi:</label>
            <input type="date" name="tgl_transaksi" required>
        </div>
        <div class="form-group">
            <label>Uraian Transaksi:</label>
            <input type="text" name="uraian" required>
        </div>
        
        <div class="form-group">
            <label>Jenis Transaksi (Pilih salah satu):</label>
            <div class="radio-button-group">
                <input type="radio" id="jenis_debet" name="jenis_transaksi" value="Debet" required>
                <label for="jenis_debet">Debet (Uang Masuk)</label>
                
                <input type="radio" id="jenis_kredit" name="jenis_transaksi" value="Kredit">
                <label for="jenis_kredit">Kredit (Uang Keluar)</label>
            </div>
        </div>

        <div class="form-group">
            <label>Nominal Debet (Isi 0 jika tidak ada):</label>
            <input type="number" name="debet" value="0" required>
        </div>
        <div class="form-group">
            <label>Nominal Kredit (Isi 0 jika tidak ada):</label>
            <input type="number" name="kredit" value="0" required>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Kirim Data</button>
        <div id="message"></div>
    </form>
</div>

<script>
    // GANTI URL DI BAWAH INI DENGAN URL APPS SCRIPT ANDA DARI LANGKAH 1
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyu4lA1VZ6tfBdHtOLAQ9We6YpCErYyG2-7Gmuc8siUgIgltKWVm8EkPXo8twQlFE6K/exec';
    const form = document.forms['dataForm'];
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');

    form.addEventListener('submit', e => {
        e.preventDefault(); // Mencegah reload halaman
        submitBtn.disabled = true;
        submitBtn.innerHTML = "Mengirim...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                message.style.display = "block";
                message.style.backgroundColor = "#d4edda";
                message.style.color = "#155724";
                message.innerHTML = "Data berhasil disimpan ke Google Sheets!";
                form.reset(); // Mengosongkan form
                submitBtn.disabled = false;
                submitBtn.innerHTML = "Kirim Data";
                
                // Menghilangkan pesan setelah 5 detik
                setTimeout(() => { message.style.display = "none"; }, 5000);
            })
            .catch(error => {
                message.style.display = "block";
                message.style.backgroundColor = "#f8d7da";
                message.style.color = "#721c24";
                message.innerHTML = "Terjadi kesalahan! Data gagal dikirim.";
                submitBtn.disabled = false;
                submitBtn.innerHTML = "Kirim Data";
                console.error('Error!', error.message);
            });
    });
</script>

</body>
</html>
