<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Video Saya</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    /* Navbar */
    nav {
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00d4ff;
    }

    h1 {
      text-align: center;
      margin: 30px 0;
    }

    /* Container */
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Video Card */
    .video-card {
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: 0.3s;
      text-align: center;
      max-width: 800px;
      width: 100%;
    }

    .video-card:hover {
      transform: translateY(-10px);
    }

    /* Responsive Video */
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 ratio */
      height: 0;
      overflow: hidden;
      border-radius: 15px;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Caption */
    .caption {
      margin-top: 15px;
      font-size: 18px;
      opacity: 0.9;
    }

    /* Footer */
    footer {
      margin-top: 40px;
      padding: 15px;
      text-align: center;
      background: rgba(0,0,0,0.7);
    }
  </style>

</head>
<body>

  <!-- Navbar -->
  <nav>
    <a href="index.html">Home</a>
    <a href="biodata.html">Biodata</a>
    <a href="galery.html">Galeri</a>
    <a href="video.html">Video</a>
  </nav>

  <h1>Video Favorit Saya</h1>

  <!-- Video -->
  <div class="container">
    <div class="video-card">

      <div class="video-wrapper">
        <iframe src="vidio rumah.mp4" allowfullscreen></iframe>
      </div>

      <div class="caption">
        🎬 Video menarik untuk ditonton!
      </div>

    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>© 2026 Website Saya</p>
  </footer>

</body>
</html>
