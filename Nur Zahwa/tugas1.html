<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Tugas 1</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    nav {
      background: rgba(0,0,0,0.7);
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 20px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #00d4ff;
    }

    h1, h2 {
      text-align: center;
      margin: 30px 0;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      margin: 20px auto;
      max-width: 600px;
    }

    /* Biodata */
    .profile {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    /* Galeri */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* Video */
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      max-width: 800px;
      margin: auto;
    }

    .video-wrapper iframe {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    footer {
      margin-top: 40px;
      padding: 15px;
      text-align: center;
      background: rgba(0,0,0,0.7);
    }
  </style>
</head>

<body>
