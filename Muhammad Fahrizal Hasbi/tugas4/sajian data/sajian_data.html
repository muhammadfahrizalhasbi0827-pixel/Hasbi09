<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Sajian Data</title>
<style>
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #f4f7f6;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  /* Container untuk Dashboard */
  .dashboard-container {
    width: 100%;
    max-width: 1200px; /* Lebar maksimal dashboard */
    background: #fff;
    padding: 10px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .responsive-iframe {
    width: 100%;
    height: 700px; /* Tinggi dashboard */
    border: none;
    border-radius: 8px;
  }

  .nav-back {
    margin-top: 25px;
  }

  .nav-back a {
    text-decoration: none;
    color: #4285F4;
    font-weight: bold;
    padding: 10px 20px;
    border: 2px solid #4285F4;
    border-radius: 8px;
    transition: all 0.3s;
  }

  .nav-back a:hover {
    background-color: #4285F4;
    color: #fff;
  }
</style>
</head>
<body>

  <div class="header">
    <h1>Dashboard Sajian Data</h1>
  </div>

  <div class="dashboard-container">
    <!-- Ganti URL embed di bawah ini dengan link 'Embed Report' dari Looker Studio Anda -->
    <iframe 
      class="responsive-iframe" 
      src="https://datastudio.google.com/embed/reporting/4e24bac8-047a-4adb-82cf-205ec29dc9ba/page/page_12345" 
      allowfullscreen>
    </iframe>
  </div>

  <div class="nav-back">
    <a href="../index2.html">← Kembali ke Halaman Utama</a>
  </div>

</body>
</html>
