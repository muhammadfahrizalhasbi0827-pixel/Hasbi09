<!DOCTYPE html>

<head>

<title>Link Google Form</title>
<style>

    height: 100vh;
    margin: 0;
  }

  .container {

    margin-bottom: 20px;
    color: #333;
  }

  a.button {

    color: white;

    text-decoration: none;

    transition: background-color 0.3s;

  a.button:hover {

  }

  /* Navigasi Kembali */
  .nav-back {
    margin-top: 20px;
  }
