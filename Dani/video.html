<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Website - Video</title>
    <style>
        /* CSS TEMA GREEN (Konsisten dengan halaman lain) */
        :root {
            --primary-green: #2d6a4f;
            --light-green: #d8f3dc;
            --accent-green: #40916c;
            --dark-green: #1b4332;
            --text-color: #1b4332;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-green);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--dark-green);
            color: var(--white);
            padding: 1rem 0;
            text-align: center;
        }

        nav {
            background-color: var(--primary-green);
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            padding: 15px 25px;
            font-weight: 600;
        }

        nav a:hover {
            background-color: var(--accent-green);
        }

        /* --- STYLING KHUSUS VIDEO --- */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            color: var(--primary-green);
            margin-bottom: 30px;
        }

        .video-wrapper {
            margin-bottom: 40px;
            text-align: center;
        }

        /* Styling Video Lokal */
        video {
            width: 100%;
            max-width: 700px;
            border-radius: 10px;
            border: 4px solid var(--accent-green);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Styling Video YouTube (Responsive) */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Rasio 16:9 */
            height: 0;
            overflow: hidden;
            max-width: 100%;
            border-radius: 10px;
            border: 4px solid var(--accent-green);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-title {
            margin-top: 15px;
            font-weight: bold;
            color: var(--primary-green);
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: var(--dark-green);
            color: var(--white);
            margin-top: 50px;
        }
    </style>
</head>
