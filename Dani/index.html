    <style>
        /* CSS UNTUK TEMA GREEN */
        :root {
            --primary-green: #2d6a4f;
            --light-green: #d8f3dc;
            --accent-green: #40916c;
            --dark-green: #1b4332;
            --text-color: #1b4332;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-green);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background-color: var(--dark-green);
            color: var(--white);
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Navigasi */
        nav {
            background-color: var(--primary-green);
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            padding: 15px 25px;
            font-weight: 600;
            transition: background 0.3s;
        }

        nav a:hover {
            background-color: var(--accent-green);
        }

        /* Konten Utama */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-height: 400px;
        }

        h2 {
            color: var(--primary-green);
            border-bottom: 2px solid var(--light-green);
            padding-bottom: 10px;
        }

        .hero-section {
            text-align: center;
            padding: 40px 20px;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-green);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: var(--dark-green);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background-color: var(--dark-green);
            color: var(--white);
            margin-top: 50px;
        }
    </style>
