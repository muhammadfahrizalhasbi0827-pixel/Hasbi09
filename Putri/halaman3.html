<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Bank</title>
    <style>
       * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #d987c6 0%, #e757e7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-container {
            background: rgb(233, 227, 227);
            border-radius: 20px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
        }
        h1 { color: #333; text-align: center; margin-bottom: 40px; font-size: 1.7em; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input, select { 
            width: 100%; padding: 15px; border: 2px solid #b6c1cb; 
            border-radius: 12px; font-size: 16px; transition: all 0.3s; 
            background: #dee0e1;
        }
        input:focus, select:focus {
            outline: none; border-color: #4facfe; background: white;
            box-shadow: 0 0 0 4px rgba(79,172,254,0.1);
        }
        .date-group {
            display: grid; grid-template-columns: 2fr 2fr 3fr; gap: 12px;
        }
        .progress { 
            text-align: center; color: #666; margin-bottom: 20px;
            font-weight: bold; font-size: 0.9em;
        }
        button {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, #c9d4de, #d3ddde); color: white;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(79,172,254,0.4); }
        .link-next { background: linear-gradient(135deg, #eb96e4, #da64c8); margin-top: 20px; }
        .storage-warning { background: #dad3ba; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #e0dcd1; }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="progress">Progres: 2 dari 3</div>
        <h1>Data Rekening Bank</h1>
        <form id="bankForm">
            <div class="form-group">
                <label for="namaBank">Nama Bank *</label>
                <input type="text" id="namaBank" list="bankList" placeholder="Ketik atau pilih bank (BCA, BNI...)" required>
                <datalist id="bankList">
                    <option value="BCA">
                    <option value="BNI">
                    <option value="BRI">
                    <option value="Bank Mandiri">
                    <option value="Bank Syariah Indonesia">
                    <option value="CIMB Niaga">
                    <option value="Bank Danamon">
                    <option value="PermataBank">
                </datalist>
            </div>
            <div class="form-group">
                <label for="noRekening">Nomor Rekening *</label>
                <input type="text" id="noRekening" placeholder="Contoh: 1234567890" inputmode="numeric" pattern="[0-9]{8,}" required title="Nomor rekening minimal 8 digit angka">
            </div>
        </form>
        <a href="halaman2.html" style="text-decoration: none;">
            <button onclick="saveBank(); if(!validateBank()) return false;">← Sebelumnya</button>
        </a>
        <a href="halaman4.html" style="text-decoration: none;">
            <button class="link-next" onclick="saveBank(); if(!validateBank()) return false;">Berikutnya</button>
        </a>
        
    </div>

    <script>
        function validateBank() {
            const form = document.getElementById('bankForm');
            return form.checkValidity();
        }

        function saveBank() {
            if (!validateBank()) {
                document.getElementById('bankForm').reportValidity();
                return false;
            }
            const data = {
                namaBank: document.getElementById('namaBank').value,
                noRekening: document.getElementById('noRekening').value,
                timestamp: new Date().toLocaleString('id-ID')
            };
            localStorage.setItem('bankData', JSON.stringify(data));
            alert('Data bank tersimpan!');
            return true;
        }

        window.onload = function() {
            const saved = localStorage.getItem('bankData');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('namaBank').value = data.namaBank || '';
                document.getElementById('noRekening').value = data.noRekening || '';
            }
        };
    </script>
</body>
</html>
